body{font-family:'DM Sans',system-ui,sans-serif;background:#020810;color:#f1f5f9;min-height:100vh;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
@keyframes ping{0%{transform:scale(1);opacity:1;}80%,100%{transform:scale(2);opacity:0;}}
.fade{animation:fadeUp .2s ease;}
button{font-family:inherit;cursor:pointer;transition:all .15s;}
button:active{transform:scale(.97);}
input,select,textarea{font-family:inherit;}
.card{background:#050d1a;border:1px solid #0a1628;border-radius:14px;padding:14px;}
.inset{background:#040c17;border:1px solid #080f1c;border-radius:11px;padding:11px;}
.pill{display:inline-flex;align-items:center;gap:3px;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;white-space:nowrap;}
.prog{height:4px;border-radius:2px;background:#0c1a2e;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s;}
.g2{display:grid;grid-template-columns:1fr 300px;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px;}
@media(max-width:860px){.g2{grid-template-columns:1fr;}.g4{grid-template-columns:1fr 1fr;}}
.stat{background:#040c17;border:1px solid #080f1c;border-radius:12px;padding:12px 14px;text-align:center;}
.stat .lbl{font-family:'DM Mono',monospace;font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.stat .val{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px;}
.stat .sub{font-size:10px;color:#334155;}
.ath-card{background:#050d1a;border:1px solid #0a1628;border-radius:12px;padding:11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.ath-card:hover{border-color:#1e3a5f;transform:translateY(-2px);}
.pipe{background:#040c17;border:1px solid #080f1c;border-radius:9px;padding:9px;min-width:158px;}
.pipe-card{background:#050d1a;border:1px solid #0a1628;border-radius:7px;padding:8px;margin-bottom:5px;cursor:grab;}
.pipe-card:hover{border-color:#3730a3;}
#toast-root{position:fixed;top:14px;right:14px;z-index:9999;pointer-events:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.modal{background:#050d1a;border-radius:16px;padding:22px;width:100%;max-width:560px;margin:auto;box-shadow:0 40px 100px rgba(0,0,0,.9);}
.nb{background:transparent;border:1px solid transparent;color:#475569;border-radius:7px;padding:5px 9px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.nb.on{color:var(--accent,#6366f1);}
.tab-btn{background:transparent;border:1px solid transparent;color:#334155;border-radius:7px;padding:6px 13px;font-size:12px;}
.tab-btn.on{background:#1a0730;border-color:#6b21a8;color:#a855f7;}
.feed-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #080f1c;}
.feed-row:last-child{border:none;}

function calcNilInternal(){

  return Math.min(Math.round(reach*0.6 + conn*2 + 10),100);
}
function calcDealRange(score){

    {key:'sport',  label:'Sport & position',  pct:0.95,                           st:'strong',                                detail:'Football · WR · HS (Power 4 target)',  action:'WR is a high-demand position for Apparel, Footwear, and Equipment brands',fixed:true},
    {key:'recruit',label:'Recruiting profile',pct:g.rivals?0.90:0.30,            st:STATUS(g.rivals?0.90:0.30),             detail:g.rivals?'5★ · #3 nationally':'Rivals not connected', action:g.rivals?'Strong recruiting profile — boosts credibility with premium brands':'Connect Rivals to pull your star rating and national ranking'},

  ];
  return dims.map(d=>({...d,sc:SC[d.st]}));
}

// MATCHING ENGINE
// ═══════════════════════════════════════════════════════════════════════════════
const SCHEME_FIT={WR:{'Air Raid':28,'Spread RPO':24,'West Coast':22,'Pro Style':18,'Power Run':10}};
function scoreMatch(prog){
  const sf=SCHEME_FIT.WR[prog.scheme]||16;
  const pt=prog.need==='immediate'?22:prog.need==='next_year'?14:6;
  const dep=Math.max(0,22-prog.depth*5);
  const tier=prog.div==='Power 4'?15:prog.div==='G5'?11:7;
  const nil=prog.nil>=4?10:prog.nil>=3?7:4;
  const acad=12;const geo=prog.state==='CA'?11:prog.state==='TX'||prog.state==='GA'?8:5;
  const total=Math.min(sf+(dep||pt)+tier+nil+acad+geo,100);
  const reasons=[];
  if(sf>=24)reasons.push(`${prog.scheme} is an ideal scheme for WRs`);
  if(prog.need==='immediate')reasons.push(`Open scholarship need this cycle at ${prog.school}`);
  if(prog.nil>=4)reasons.push(`Strong NIL collective — avg $${(prog.nilAvg/1000).toFixed(0)}K per deal`);
  if(prog.depth<=1)reasons.push(`Thin at WR — high playing time likelihood`);
  return {score:Math.round(total),reasons:reasons.slice(0,3)};
}

function renderPage(){
  const p=S.page,r=S.role;
  if(p==='home'){if(r==='athlete')return renderAthleteHome();if(r==='coach')return renderCoachHome();if(r==='brand')return renderBrandHome();if(r==='admin')return renderAdminHome();}
  if(p==='portal')return renderPortal();
  if(p==='myid')return renderMarketProfile();
  if(p==='deals')return renderDeals();
  if(p==='matching')return renderMatching();
  if(p==='media')return renderMedia();
  if(p==='inbox')return renderInbox();
  if(p==='board')return renderBoard();
  if(p==='tracker')return renderTracker();
  if(p==='discover')return renderDiscover();
  if(p==='campaigns')return renderCampaigns();
  if(p==='staff')return renderStaffFPTs();
  if(p==='compliance')return renderCompliance();
  return renderAthleteHome();
}

// ─── FPT actions ───────────────────────────────────────────────────────────────
function openRevokeModal(id,action){
  const s=S.staffList.find(x=>x.id===id);
  document.getElementById('modal-root').innerHTML=`
  <div class="overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()" style="border:1px solid ${action==='revoke'?'#7f1d1d':'#78350f'};max-width:420px;">
      <h3 style="font-weight:700;font-size:18px;margin-bottom:8px;color:${action==='revoke'?'#f87171':'#f59e0b'};">${action==='revoke'?'🚨 Revoke FPT':'⚠ Suspend Staff Member'}</h3>
      <div style="font-size:13px;color:#64748b;line-height:1.6;margin-bottom:14px;">${action==='revoke'?`<b style="color:#f1f5f9;">${s.name}</b> will be <b style="color:#f87171;">immediately locked out</b>. They lose all access to athlete data, messaging, and recruiting tools. This action is logged.`:`<b style="color:#f1f5f9;">${s.name}</b> will retain read-only portal access but cannot message athletes or make offers.`}</div>
      <div style="margin-bottom:14px;">
        <label style="font-size:11px;font-family:'DM Mono',monospace;color:#475569;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;">Reason (required for audit log)</label>
        <textarea id="revoke-reason" rows="2" placeholder="${action==='revoke'?'e.g. Staff member terminated 3/15/2026':'e.g. Under investigation'}" style="width:100%;background:#071120;border:1px solid #0f1e35;border-radius:9px;padding:10px 12px;color:#f1f5f9;font-size:13px;font-family:inherit;resize:vertical;outline:none;"></textarea>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeModal()" style="flex:1;background:transparent;border:1px solid #0f1e35;color:#94a3b8;border-radius:9px;padding:10px;font-size:13px;font-family:inherit;">Cancel</button>
        <button onclick="confirmRevoke('${id}','${action}')" style="flex:1;background:${action==='revoke'?'#7f1d1d':'#78350f'};color:${action==='revoke'?'#f87171':'#f59e0b'};border:1px solid ${action==='revoke'?'#ef4444':'#f59e0b'};border-radius:9px;padding:10px;font-size:13px;font-weight:700;font-family:inherit;">${action==='revoke'?'Revoke — lock out now':'Suspend'}</button>
      </div>
    </div>
  </div>`;
}
function confirmRevoke(id,action){
  const reason=document.getElementById('revoke-reason')?.value;
  if(!reason?.trim()){toast('Reason required for audit log.',false);return;}
  S.staffList=S.staffList.map(s=>s.id===id?{...s,status:action==='revoke'?'revoked':'suspended',reason}:s);
  const s=S.staffList.find(x=>x.id===id);
  S.complianceLog=[{icon:action==='revoke'?'🚨':'⚠',txt:`${s.name} FPT ${action==='revoke'?'revoked':'suspended'} — ${reason}`,time:'Just now',c:action==='revoke'?'#f87171':'#f59e0b'},...S.complianceLog];
  closeModal();render();
  toast(action==='revoke'?'FPT revoked. Staff locked out immediately.':'Staff member suspended.');
}
function reinstateStaff(id){
  S.staffList=S.staffList.map(s=>s.id===id?{...s,status:'active',reason:undefined}:s);
  const s=S.staffList.find(x=>x.id===id);
  S.complianceLog=[{icon:'✓',txt:`${s.name} FPT reinstated`,time:'Just now',c:'#4ade80'},...S.complianceLog];
  render();toast('Staff member reinstated.');
}
function manualVerify(id){
  S.staffList=S.staffList.map(s=>s.id===id?{...s,status:'active'}:s);
  const s=S.staffList.find(x=>x.id===id);
  S.complianceLog=[{icon:'✓',txt:`${s.name} FPT manually verified by admin`,time:'Just now',c:'#4ade80'},...S.complianceLog];
  render();toast('FPT verified. Full access granted.');
}
