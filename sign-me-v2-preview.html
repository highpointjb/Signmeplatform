// ── SCORE ─────────────────────────────────────────────────────────────────────
function scoreP(p){
  const sf={'Air Raid':28,'Spread RPO':24,'Pro Style':18,'Power Run':10}[p.scheme]||16;
  const pt=p.need==='immediate'?22:p.need==='next_year'?14:6;
  const dep=Math.max(0,22-p.depth*5);
  const score=Math.min(sf+(dep||pt)+15+(p.nilR>=4?10:7)+12+(p.state==='CA'?11:['TX','GA'].includes(p.state)?8:5),100);
  const reasons=[];
  if(sf>=24)reasons.push(`${p.scheme} is ideal for WRs`);
  if(p.need==='immediate')reasons.push('Open scholarship need this cycle');
  if(p.nilR>=4)reasons.push(`Strong NIL — avg ${cur(p.nilAvg)}/deal`);
  if(p.depth<=1)reasons.push('Thin at WR — high playing time');
  return{school:p.school,conf:p.conf,score:Math.round(score),reasons:reasons.slice(0,2),verified:p.need==='immediate'&&p.depth<=2};
}

function tour(){

          ${steps.map((_,i)=>`<div style="height:4px;border-radius:2px;flex:${i===S.tourStep?2:1};background:${i<=S.tourStep?'#f59e0b':'#f5f5f0'};transition:all .3s;"></div>`).join('')}

function nextTour(){

  const n=S.tourStep+1;
  set({tourStep:n,page:steps[n].pg});

        ${isCoach?`<button onclick="S.board['${a.id}']='Identified';render();closeMod();toast('${a.name} added to board!')" class="btn btn-secondary btn-md">+ Board</button>`:''}
        ${isBrand&&a.nil?`<button onclick="closeMod();toast('NIL offer sent to ${a.name}!')" class="btn btn-primary btn-md btn-full">Send NIL offer →</button>`:''}
      </div>
    </div>
  </div>`;
}

function openRevoke(id,action){
  const s=S.staffList.find(x=>x.id===id);
  document.getElementById('modals').innerHTML=`
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(8px);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;" onclick="closeMod()">
    <div class="card fade" style="width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.14);border-color:${action==='revoke'?'#fecaca':'#fde68a'};" onclick="event.stopPropagation()">
      <h3 style="font-weight:700;font-size:17px;color:${action==='revoke'?'#dc2626':'#d97706'};margin-bottom:8px;">${action==='revoke'?'🚨 Revoke FPT':'⚠️ Suspend Staff Member'}</h3>
      <p style="font-size:13px;color:#78786a;line-height:1.65;margin-bottom:14px;">
        ${action==='revoke'?`<b>${s.name}</b> will be <b style="color:#dc2626;">immediately locked out</b> of all platform features. This action is logged to the audit trail.`:`<b>${s.name}</b> will retain read-only portal access but cannot message athletes or make offers.`}
      </p>
      <label style="display:block;font-size:11px;font-weight:700;color:#a8a898;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Reason (required for audit log)</label>
      <textarea id="rr" rows="2" placeholder="${action==='revoke'?'e.g. Staff member terminated 3/15/2026':'e.g. Under investigation'}"
        style="width:100%;background:#fafaf8;border:1px solid #e8e8e0;border-radius:10px;padding:10px 12px;font-size:13px;resize:none;outline:none;margin-bottom:14px;"></textarea>
      <div style="display:flex;gap:8px;">
        <button onclick="closeMod()" class="btn btn-secondary btn-md">Cancel</button>
        <button onclick="confirmRevoke('${id}','${action}')" class="btn btn-md btn-full" style="background:${action==='revoke'?'#dc2626':'#d97706'};color:#fff;">
          ${action==='revoke'?'Revoke — lock out now':'Suspend'}
        </button>
      </div>
    </div>
  </div>`;
}

function confirmRevoke(id,action){
  const reason=document.getElementById('rr')?.value;
  if(!reason?.trim()){
    document.getElementById('rr').style.borderColor='#fecaca';
    document.getElementById('rr').placeholder='Required — please enter a reason';
    return;
  }
  S.staffList=S.staffList.map(s=>s.id===id?{...s,status:action==='revoke'?'revoked':'suspended',reason}:s);
  const m=S.staffList.find(s=>s.id===id);
  S.auditLog=[{icon:action==='revoke'?'🚨':'⚠️',txt:`${m.name} FPT ${action==='revoke'?'revoked':'suspended'} — ${reason}`,time:'Just now',c:action==='revoke'?'#dc2626':'#d97706'},...S.auditLog];
  closeMod();render();
  toast(action==='revoke'?'FPT revoked. Staff locked out immediately.':'Staff member suspended.');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
